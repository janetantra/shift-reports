<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase's Paradise Ranch - End of Shift Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            padding: 40px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #2c5f8d;
            padding-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #666;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #2c5f8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        
        input[type="text"],
        input[type="date"],
        input[type="time"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            background: #fafafa;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="time"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #2c5f8d;
            background: white;
        }
        
        textarea {
            resize: vertical;
            min-height: 70px;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .row.full {
            grid-template-columns: 1fr;
        }
        
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .inv-item {
            padding: 12px;
            background: #f5f5f5;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        
        .inv-item label {
            font-size: 13px;
            margin-bottom: 6px;
        }
        
        .inv-item input {
            padding: 8px;
            font-size: 13px;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }
        
        button {
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-generate {
            background: #2c5f8d;
            color: white;
            grid-column: 1 / -1;
        }
        
        .btn-generate:hover {
            background: #1f4563;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(44, 95, 141, 0.3);
        }
        
        .btn-clear {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .btn-clear:hover {
            background: #e8e8e8;
        }
        
        .btn-copy {
            background: #27ae60;
            color: white;
        }
        
        .btn-copy:hover {
            background: #1f8449;
        }
        
        .output-box {
            display: none;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 20px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #333;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .output-box.visible {
            display: block;
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        
        .alert-info {
            background: #e8f4f8;
            color: #0c447c;
            border: 1px solid #b3d9e8;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .row {
                grid-template-columns: 1fr;
            }
            
            .inventory-grid {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏕️ Chase's Paradise Ranch</h1>
            <p class="subtitle">End of Shift Report</p>
        </header>
        
        <div class="alert alert-info">
            <strong>📋 Reminder:</strong> Send this report to Adam (or Rafael) BEFORE signing out. Keep it for payroll records.
        </div>
        
        <form id="reportForm">
            <!-- SHIFT INFO -->
            <div class="section">
                <div class="section-title">Shift Information</div>
                <div class="row">
                    <div class="form-group">
                        <label for="date">Date *</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="name">Your Name *</label>
                        <input type="text" id="name" placeholder="Your full name" required>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label for="startTime">Start Time *</label>
                        <input type="time" id="startTime" required>
                    </div>
                    <div class="form-group">
                        <label for="endTime">End Time *</label>
                        <input type="time" id="endTime" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="weeklyHours">Weekly Total Hours (to date) *</label>
                    <input type="number" id="weeklyHours" step="0.5" placeholder="e.g., 40" required>
                </div>
            </div>
            
            <!-- SHIFT SUMMARY -->
            <div class="section">
                <div class="section-title">Shift Summary</div>
                <div class="form-group">
                    <label for="great">What went great today? ✅ *</label>
                    <textarea id="great" required placeholder="Describe the highlights..."></textarea>
                </div>
                <div class="form-group">
                    <label for="challenging">What was challenging? ⚠️ *</label>
                    <textarea id="challenging" required placeholder="Any obstacles or difficulties..."></textarea>
                </div>
                <div class="form-group">
                    <label for="broken">Anything broken or needing repair? 🔧 *</label>
                    <textarea id="broken" required placeholder="Equipment, facilities, etc. or 'Nothing'"></textarea>
                </div>
                <div class="form-group">
                    <label for="projects">Special projects completed? 📌 *</label>
                    <textarea id="projects" required placeholder="Any special tasks or projects or 'None'"></textarea>
                </div>
                <div class="form-group">
                    <label for="supervisor">Reviewed with (Supervisor Name) 👤 *</label>
                    <input type="text" id="supervisor" required placeholder="Name of supervisor">
                </div>
                <div class="form-group">
                    <label for="incomplete">Tasks not fully completed today? ❌ *</label>
                    <textarea id="incomplete" required placeholder="Include how this was communicated and agreed upon with manager + timeline"></textarea>
                </div>
                <div class="form-group">
                    <label for="notes">Notes for tomorrow 📝 *</label>
                    <textarea id="notes" required placeholder="Any notes for the next shift..."></textarea>
                </div>
            </div>
            
            <!-- INVENTORY COUNT -->
            <div class="section">
                <div class="section-title">Inventory Count (Exact Quantities)</div>
                <div class="inventory-grid">
                    <div class="inv-item">
                        <label for="inv_coconuts">🥥 Coconuts</label>
                        <input type="number" id="inv_coconuts" min="0">
                    </div>
                    <div class="inv-item">
                        <label for="inv_oranges">🟠 Oranges</label>
                        <input type="number" id="inv_oranges" min="0">
                    </div>
                    <div class="inv-item">
                        <label for="inv_catcans">🐱 Cat cans</label>
                        <input type="number" id="inv_catcans" min="0">
                    </div>
                    <div class="inv-item">
                        <label for="inv_chicken">🦵 Chicken feet</label>
                        <input type="number" id="inv_chicken" min="0">
                    </div>
                    <div class="inv-item">
                        <label for="inv_bones">🦴 Bones</label>
                        <input type="number" id="inv_bones" min="0">
                    </div>
                    <div class="inv-item">
                        <label for="inv_tp">🧻 Toilet Paper</label>
                        <input type="number" id="inv_tp" min="0">
                    </div>
                    <div class="inv-item">
                        <label for="inv_pt">📄 Paper Towels</label>
                        <input type="number" id="inv_pt" min="0">
                    </div>
                    <div class="inv-item">
                        <label for="inv_trash">🗑️ Trash Bags</label>
                        <input type="number" id="inv_trash" min="0">
                    </div>
                    <div class="inv-item">
                        <label for="inv_incense">🔥 Incense</label>
                        <input type="number" id="inv_incense" min="0">
                    </div>
                </div>
            </div>
            
            <!-- DAYS REMAINING -->
            <div class="section">
                <div class="section-title">Days Remaining (Estimate)</div>
                <div class="inventory-grid">
                    <div class="inv-item">
                        <label for="days_coffee">☕ Coffee</label>
                        <input type="number" id="days_coffee" min="0" step="0.5">
                    </div>
                    <div class="inv-item">
                        <label for="days_alfalfa">🌾 Alfalfa</label>
                        <input type="number" id="days_alfalfa" min="0" step="0.5">
                    </div>
                    <div class="inv-item">
                        <label for="days_salt">🧂 Mineral salt</label>
                        <input type="number" id="days_salt" min="0" step="0.5">
                    </div>
                    <div class="inv-item">
                        <label for="days_grain">🌾 Sheep grain</label>
                        <input type="number" id="days_grain" min="0" step="0.5">
                    </div>
                    <div class="inv-item">
                        <label for="days_meat">🥩 Meat for dogs</label>
                        <input type="number" id="days_meat" min="0" step="0.5">
                    </div>
                    <div class="inv-item">
                        <label for="days_rice">🍚 Rice for dogs</label>
                        <input type="number" id="days_rice" min="0" step="0.5">
                    </div>
                    <div class="inv-item">
                        <label for="days_kibble">🐱 Cat kibble</label>
                        <input type="number" id="days_kibble" min="0" step="0.5">
                    </div>
                    <div class="inv-item">
                        <label for="days_soap">🧼 Cleaning soap</label>
                        <input type="number" id="days_soap" min="0" step="0.5">
                    </div>
                    <div class="inv-item">
                        <label for="days_glass">🪟 Glass cleaner</label>
                        <input type="number" id="days_glass" min="0" step="0.5">
                    </div>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label for="lowStock">Any items at or under 2 days?</label>
                    <select id="lowStock">
                        <option value="">-- Select --</option>
                        <option value="No">No</option>
                        <option value="Yes - message Rafael">Yes - message Rafael</option>
                    </select>
                </div>
            </div>
            
            <!-- REQUESTS & GRATITUDE -->
            <div class="section">
                <div class="section-title">Additional Info</div>
                <div class="form-group">
                    <label for="order">🛒 Anything else to purchase? *</label>
                    <textarea id="order" required placeholder="List items needed or 'No'"></textarea>
                </div>
                <div class="form-group">
                    <label for="improve">💭 1 thing to improve at the ranch *</label>
                    <textarea id="improve" required placeholder="Your suggestion..."></textarea>
                </div>
                <div class="form-group">
                    <label for="grateful">✨ 3 things grateful for today *</label>
                    <textarea id="grateful" required placeholder="1. &#10;2. &#10;3. "></textarea>
                </div>
            </div>
            
            <!-- CHECKLIST BEFORE SENDING -->
            <div class="section">
                <div class="section-title">✔️ Checklist Before Sending</div>
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <label style="display:flex; align-items:center; gap:10px; font-weight:400; cursor:pointer; font-size:15px;">
                        <input type="checkbox" id="check1" style="width:20px; height:20px; accent-color:#2c5f8d; cursor:pointer;">
                        Read task
                    </label>
                    <label style="display:flex; align-items:center; gap:10px; font-weight:400; cursor:pointer; font-size:15px;">
                        <input type="checkbox" id="check2" style="width:20px; height:20px; accent-color:#2c5f8d; cursor:pointer;">
                        Complete task
                    </label>
                    <label style="display:flex; align-items:center; gap:10px; font-weight:400; cursor:pointer; font-size:15px;">
                        <input type="checkbox" id="check3" style="width:20px; height:20px; accent-color:#2c5f8d; cursor:pointer;">
                        Re-read task to confirm details
                    </label>
                </div>
            </div>

            <!-- BUTTONS -->
            <div class="button-group">
                <button type="button" class="btn-generate" onclick="generateReport()">📋 Generate WhatsApp Report</button>
                <button type="button" class="btn-clear" onclick="clearForm()">Clear Form</button>
            </div>
        </form>
        
        <!-- OUTPUT -->
        <div id="outputBox" class="output-box"></div>
        <button id="copyBtn" style="display: none; grid-column: 1 / -1; margin-top: 15px;" class="btn-copy" onclick="copyToClipboard()">📋 Copy to Clipboard</button>
    </div>
    
    <script>
        // Set today's date as default
        document.getElementById('date').valueAsDate = new Date();
        
        function generateReport() {
            const form = document.getElementById('reportForm');
            if (!form.checkValidity()) {
                alert('Please fill in all required fields (*) before generating the report.');
                return;
            }
            const check1 = document.getElementById('check1').checked;
            const check2 = document.getElementById('check2').checked;
            const check3 = document.getElementById('check3').checked;
            if (!check1 || !check2 || !check3) {
                alert('⚠️ Please complete all 3 checklist items before sending!');
                return;
            }
            
            const data = {
                date: document.getElementById('date').value,
                name: document.getElementById('name').value,
                startTime: document.getElementById('startTime').value,
                endTime: document.getElementById('endTime').value,
                weeklyHours: document.getElementById('weeklyHours').value,
                great: document.getElementById('great').value,
                challenging: document.getElementById('challenging').value,
                broken: document.getElementById('broken').value,
                projects: document.getElementById('projects').value,
                supervisor: document.getElementById('supervisor').value,
                incomplete: document.getElementById('incomplete').value,
                notes: document.getElementById('notes').value,
                inv_coconuts: document.getElementById('inv_coconuts').value,
                inv_oranges: document.getElementById('inv_oranges').value,
                inv_catcans: document.getElementById('inv_catcans').value,
                inv_chicken: document.getElementById('inv_chicken').value,
                inv_bones: document.getElementById('inv_bones').value,
                inv_tp: document.getElementById('inv_tp').value,
                inv_pt: document.getElementById('inv_pt').value,
                inv_trash: document.getElementById('inv_trash').value,
                inv_incense: document.getElementById('inv_incense').value,
                days_coffee: document.getElementById('days_coffee').value,
                days_alfalfa: document.getElementById('days_alfalfa').value,
                days_salt: document.getElementById('days_salt').value,
                days_grain: document.getElementById('days_grain').value,
                days_meat: document.getElementById('days_meat').value,
                days_rice: document.getElementById('days_rice').value,
                days_kibble: document.getElementById('days_kibble').value,
                days_soap: document.getElementById('days_soap').value,
                days_glass: document.getElementById('days_glass').value,
                lowStock: document.getElementById('lowStock').value,
                order: document.getElementById('order').value,
                improve: document.getElementById('improve').value,
                grateful: document.getElementById('grateful').value,
            };
            
            const report = `
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
END OF SHIFT REPORT – CHASE'S PARADISE RANCH
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

📋 SHIFT INFO
Date: ${data.date}
Name: ${data.name}
Start: ${data.startTime} | End: ${data.endTime}
Weekly Total: ${data.weeklyHours} hours

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

✅ WHAT WENT GREAT?
${data.great || '—'}

⚠️ WHAT WAS CHALLENGING?
${data.challenging || '—'}

🔧 BROKEN/NEEDS REPAIR?
${data.broken || '—'}

📌 SPECIAL PROJECTS COMPLETED?
${data.projects || '—'}

👤 REVIEWED WITH: ${data.supervisor || '—'}

❌ TASKS NOT COMPLETED?
${data.incomplete || '—'}

📝 NOTES FOR TOMORROW:
${data.notes || '—'}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

📦 INVENTORY COUNT (Exact #)
🥥 Coconuts: ${data.inv_coconuts || '—'}
🟠 Oranges: ${data.inv_oranges || '—'}
🐱 Cat cans: ${data.inv_catcans || '—'}
🦵 Chicken feet: ${data.inv_chicken || '—'}
🦴 Bones: ${data.inv_bones || '—'}
🧻 Toilet Paper: ${data.inv_tp || '—'}
📄 Paper Towels: ${data.inv_pt || '—'}
🗑️ Trash Bags: ${data.inv_trash || '—'}
🔥 Incense: ${data.inv_incense || '—'}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

📅 DAYS REMAINING (Est.)
☕ Coffee: ${data.days_coffee || '—'} days
🌾 Alfalfa: ${data.days_alfalfa || '—'} days
🧂 Mineral salt: ${data.days_salt || '—'} days
🌾 Sheep grain: ${data.days_grain || '—'} days
🥩 Meat for dogs: ${data.days_meat || '—'} days
🍚 Rice for dogs: ${data.days_rice || '—'} days
🐱 Cat kibble: ${data.days_kibble || '—'} days
🧼 Cleaning soap: ${data.days_soap || '—'} days
🪟 Glass cleaner: ${data.days_glass || '—'} days

⚠️ LOW STOCK ALERT: ${data.lowStock || '—'}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

🛒 ANYTHING ELSE TO ORDER?
${data.order || '—'}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

💭 GRATITUDE & SUGGESTIONS
1 thing to improve at the ranch:
${data.improve || '—'}

3 things I'm grateful for today:
${data.grateful || '—'}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

✔️ CHECKLIST BEFORE SENDING:
☐ Read task
☐ Complete task
☐ Re-read task to confirm details


━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
            
            const outputBox = document.getElementById('outputBox');
            outputBox.textContent = report;
            outputBox.classList.add('visible');
            document.getElementById('copyBtn').style.display = 'block';
            
            outputBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function copyToClipboard() {
            const outputBox = document.getElementById('outputBox');
            const text = outputBox.textContent;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalText = btn.textContent;
                btn.textContent = '✅ Copied to Clipboard!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                alert('Could not copy. Please try again.');
            });
        }
        
        function clearForm() {
            document.getElementById('reportForm').reset();
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('check1').checked = false;
            document.getElementById('check2').checked = false;
            document.getElementById('check3').checked = false;
            document.getElementById('outputBox').classList.remove('visible');
            document.getElementById('copyBtn').style.display = 'none';
        }
    </script>
</body>
</html>
